name: Bug report
description: Report reproducible incorrect or unsafe behavior
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: >-
        Remove credentials and private source code from logs. Security vulnerabilities belong in
        GitHub private vulnerability reporting, not a public issue.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: opencode-version
    attributes:
      label: OpenCode version
      description: Output of `opencode --version`.
      placeholder: 1.18.3
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Bun version, and installation method.
      placeholder: Windows 11 x64, Bun 1.3.14, npm plugin
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Minimal configuration
      description: Include relevant plugin options, with secrets removed.
      render: jsonc
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest file, tool call, and sequence that reproduces the problem.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized logs or tool output when useful.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reproduced this with the latest compatible plugin release.
          required: true
        - label: I removed credentials and private source code.
          required: true
