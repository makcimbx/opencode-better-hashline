name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      created: ${{ steps.release.outputs.release_created }}
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check bootstrap release
        id: bootstrap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.1.0 --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Release Please starts after the documented v0.1.0 bootstrap release."
          fi

      - name: Create or update release pull request
        id: release
        if: steps.bootstrap.outputs.ready == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out release pull request
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Check out released revision
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ steps.release.outputs.sha }}
          persist-credentials: false

      - name: Set up Bun for release notes
        if: steps.release.outputs.prs_created == 'true' || steps.release.outputs.release_created == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Sync curated release pull request notes
        if: steps.release.outputs.prs_created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          notes="${RUNNER_TEMP}/release-notes.md"
          body="${RUNNER_TEMP}/release-pr-body.md"
          PR_NUMBER="$(jq -er '.number' <<< "${RELEASE_PR}")"
          bun ./scripts/sync-release-notes-cli.ts sync CHANGELOG.md "${notes}"
          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: sync curated release notes"
            git push
          fi
          printf ':robot: I have created a release *beep* *boop*\n---\n\n' > "${body}"
          cat "${notes}" >> "${body}"
          printf '\n---\nThis PR was generated with [Release Please](https://github.com/googleapis/release-please).\n' >> "${body}"
          gh pr edit "${PR_NUMBER}" --body-file "${body}"

      - name: Sync GitHub release notes
        if: steps.release.outputs.release_created == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          notes="${RUNNER_TEMP}/release-notes.md"
          bun ./scripts/sync-release-notes-cli.ts extract CHANGELOG.md "${RELEASE_VERSION}" "${notes}"
          gh release edit "${RELEASE_TAG}" --notes-file "${notes}"

  publish:
    name: Publish npm package
    needs: release
    if: needs.release.outputs.created == 'true'
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out released revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ needs.release.outputs.sha }}
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release source
        run: bun run ci

      - name: Verify release version
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${RELEASE_TAG}" = "v${package_version}"
          test "${RELEASE_VERSION}" = "${package_version}"

      - name: Install pinned npm CLI
        run: npm install --global npm@11.18.0

      - name: Verify and retain release artifact
        id: pack
        shell: bash
        run: |
          bun run release:pack
          tarball="$(node -p "require('./package.json').name + '-' + require('./package.json').version + '.tgz'")"
          test -f "${tarball}"
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"

      - name: Publish with OIDC provenance
        run: npm publish "${{ steps.pack.outputs.tarball }}" --access public --provenance
